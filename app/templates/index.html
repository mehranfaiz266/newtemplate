{% extends 'base.html' %}
{% block content %}
<h2>Your Credentials</h2>
<table class="table">
  <thead>
    <tr>
      <th>Name</th><th>API Key</th><th>Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for c in creds %}
    <tr>
      <td>{{ c.name }}</td>
      <td>{{ c.api_key }}</td>
      <td><a href="{{ url_for('view_credential', cred_id=c.id) }}" class="btn btn-sm btn-primary">View Secret</a></td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
